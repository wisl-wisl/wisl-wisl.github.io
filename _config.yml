exclude: 
  - README.md
  - SECURITY.md
  - Dockerfile
  - docker*
  - Gemfile
  - '*.yml'
  - '*.yaml'
permalink: pretty
url: "https://wisl.earth"
title: "WISL"
tagline: "West Information Services Limited"
description: "West Information Services Limited — IT consulting, managed services, Ubiquiti UniFi networks, Linux and open source software, and emergency support in the West Chilcotin, British Columbia, Canada."
logo: "/images/logo/wisl.svg"
social:
  name: "West Information Services Limited"
  links:
    - "https://github.com/wisl-wisl/wisl-wisl.github.io"

plugins:
  - jekyll-environment-variables
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      image: "/images/features/blacktusk.jpg"

google_analytics_id: "G-06888T50J0"
brand:
  mobile: "images/logo/wisl.svg"
  desktop: "images/logo/wisl.svg"
  desktop_height: "80px"
footer:
  copyright_text: '© WISL 🌎'

collections:
  services:
    output: false
  team:
    output: false
    
sass:
  # dart-sass (jekyll-sass-converter 3.x) only supports expanded/compressed;
  # the old libsass options (indentWidth/precision, style: compact) are ignored.
  style: compressed
  # Silence the deprecation warnings from the vendored Bootstrap 4 SCSS, which
  # we don't maintain. quiet_deps covers warnings raised inside the imported
  # files; silence_deprecations also covers the @import statements themselves
  # (flagged in the root stylesheet). The real fix is a Bootstrap 5 upgrade.
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions
